name: Regenerate Pydantic types

on:
  push:
    branches: [main]
    paths:
      - "eval.schema.json"
      - "instance_level_eval.schema.json"

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/astral-sh/uv:python3.12-trixie
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: uv sync

      - name: Regenerate eval_types.py
        run: |
          uv run datamodel-codegen \
            --input eval.schema.json \
            --output eval_types.py \
            --class-name EvaluationLog \
            --output-model-type pydantic_v2.BaseModel \
            --input-file-type jsonschema \
            --formatters ruff-format ruff-check

      - name: Regenerate instance_level_types.py
        run: |
          uv run datamodel-codegen \
            --input instance_level_eval.schema.json \
            --output instance_level_types.py \
            --class-name InstanceLevelEvaluationLog \
            --output-model-type pydantic_v2.BaseModel \
            --input-file-type jsonschema \
            --formatters ruff-format ruff-check

      - name: Apply post-codegen patches
        run: uv run python post_codegen.py

      - name: Run tests
        run: uv run pytest

      - name: Create PR if changes
        run: |
          git diff --quiet eval_types.py instance_level_types.py && exit 0
          git checkout -b auto/regenerate-types
          git add eval_types.py instance_level_types.py
          git commit -m "chore: regenerate Pydantic types from updated schema"
          git push -u origin auto/regenerate-types
          gh pr create --title "chore: regenerate Pydantic types" \
            --body "Auto-generated from schema changes in \`eval.schema.json\` and/or \`instance_level_eval.schema.json\`."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
